openapi: 3.0.0
info:
  title: GymTrack API - Trainer-Athlete Relationships
  description: Relationship management endpoints for trainers and athletes to manage coaching connections
  version: 1.0.0
  contact:
    name: GymTrack API Support
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api
    description: Development server

paths:
  /relationships/invite:
    post:
      tags:
        - Relationships
      summary: Generate invitation code
      description: Trainers generate an 8-character invitation code to share with athletes. The code expires after a set period.
      operationId: generateInvitation
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Invitation generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateInvitationResponse'
              example:
                message: "Invitation generated successfully"
                invitation:
                  code: "ABC12345"
                  expiresAt: "2024-01-02T00:00:00Z"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Only trainers can generate invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Only trainers can generate invitations"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to generate invitation"

  /relationships/accept:
    post:
      tags:
        - Relationships
      summary: Accept invitation
      description: Athletes accept an invitation by providing the 8-character code generated by a trainer.
      operationId: acceptInvitation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
            example:
              code: "ABC12345"
      responses:
        '200':
          description: Invitation accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInvitationResponse'
              example:
                message: "Invitation accepted successfully"
                relationship:
                  relationshipId: "rel-001"
                  trainerId: "trainer-123"
                  athleteId: "athlete-456"
                  status: "active"
                  createdAt: "2024-01-15T10:00:00Z"
                  updatedAt: "2024-01-15T10:00:00Z"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_body:
                  summary: Invalid request body
                  value:
                    error: "Invalid request body"
                validation_failed:
                  summary: Validation failed
                  value:
                    error: "Validation failed"
                invalid_code:
                  summary: Invalid invitation code
                  value:
                    error: "Invalid invitation code"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Only athletes can accept invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Only athletes can accept invitations"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to accept invitation"

  /relationships/my-trainer:
    get:
      tags:
        - Relationships
      summary: Get my trainer
      description: Athletes can view their currently assigned trainer and any pending invitation codes.
      operationId: getMyTrainer
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyTrainerResponse'
              examples:
                with_trainer:
                  summary: Athlete with active trainer
                  value:
                    pendingInvitations: []
                    activeTrainer:
                      relationship:
                        relationshipId: "rel-001"
                        trainerId: "trainer-123"
                        athleteId: "athlete-456"
                        status: "active"
                        createdAt: "2024-01-15T10:00:00Z"
                        updatedAt: "2024-01-15T10:00:00Z"
                      trainer:
                        userId: "trainer-123"
                        email: "trainer@example.com"
                        role: "trainer"
                        profile:
                          name: "Jane Smith"
                          certifications: "NASM-CPT"
                          specializations: "Strength training"
                          yearsOfExperience: 5
                          location: "New York"
                          hourlyRate: 75
                        createdAt: "2024-01-01T00:00:00Z"
                        updatedAt: "2024-01-01T00:00:00Z"
                with_invitations:
                  summary: Athlete with pending invitations
                  value:
                    pendingInvitations:
                      - invitationId: "inv-001"
                        code: "ABC12345"
                        trainerId: "trainer-123"
                        athleteId: "athlete-456"
                        status: "pending"
                        expiresAt: "2024-01-02T00:00:00Z"
                        createdAt: "2024-01-01T12:00:00Z"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Only athletes can view their trainer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Only athletes can view their trainer"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to retrieve invitations/relationships"

  /relationships/my-clients:
    get:
      tags:
        - Relationships
      summary: Get my clients
      description: Trainers can view all their active client relationships with athlete profiles.
      operationId: getMyClients
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyClientsResponse'
              example:
                clients:
                  - relationship:
                      relationshipId: "rel-001"
                      trainerId: "trainer-123"
                      athleteId: "athlete-456"
                      status: "active"
                      createdAt: "2024-01-15T10:00:00Z"
                      updatedAt: "2024-01-15T10:00:00Z"
                    athlete:
                      userId: "athlete-456"
                      email: "athlete@example.com"
                      role: "athlete"
                      profile:
                        name: "John Doe"
                        age: 25
                        weight: 75
                        height: 180
                        fitnessGoals: "Build muscle"
                        trainerAssignment: "trainer-123"
                      createdAt: "2024-01-01T00:00:00Z"
                      updatedAt: "2024-01-01T00:00:00Z"
                count: 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Only trainers can view their clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Only trainers can view their clients"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to retrieve clients"

  /relationships/client/{id}:
    get:
      tags:
        - Relationships
      summary: Get client details
      description: Trainers can view comprehensive details for a specific client including workout/meal counts and current week activity.
      operationId: getClientDetails
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Client (athlete) user ID
          schema:
            type: string
          example: "athlete-456"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetClientDetailsResponse'
              example:
                relationship:
                  relationshipId: "rel-001"
                  trainerId: "trainer-123"
                  athleteId: "athlete-456"
                  status: "active"
                  createdAt: "2024-01-15T10:00:00Z"
                  updatedAt: "2024-01-15T10:00:00Z"
                athlete:
                  userId: "athlete-456"
                  email: "athlete@example.com"
                  role: "athlete"
                  profile:
                    name: "John Doe"
                    age: 25
                    weight: 75
                    height: 180
                    fitnessGoals: "Build muscle"
                    trainerAssignment: "trainer-123"
                  createdAt: "2024-01-01T00:00:00Z"
                  updatedAt: "2024-01-01T00:00:00Z"
                stats:
                  totalWorkouts: 15
                  totalMeals: 45
                  workoutsThisWeek: 3
                  mealsThisWeek: 9
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                trainer_only:
                  summary: Only trainers can view client details
                  value:
                    error: "Only trainers can view client details"
                no_relationship:
                  summary: No active relationship
                  value:
                    error: "You don't have an active relationship with this client"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to verify relationship/get athlete details"

  /relationships/client/{id}/stats:
    get:
      tags:
        - Relationships
      summary: Get client statistics
      description: Trainers can view detailed analytics including workout volume trends, exercise breakdown, consistency scores, and nutrition averages for a specific client.
      operationId: getClientStats
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Client (athlete) user ID
          schema:
            type: string
          example: "athlete-456"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetClientStatsResponse'
              example:
                workoutStats:
                  totalVolume: 15000.5
                  weeklyVolume:
                    - week: "2024-W02"
                      volume: 3500.0
                      workouts: 3
                    - week: "2024-W03"
                      volume: 4200.0
                      workouts: 4
                  exerciseBreakdown:
                    - name: "Bench Press"
                      totalSets: 20
                      totalReps: 160
                      maxWeight: 80.0
                    - name: "Squat"
                      totalSets: 15
                      totalReps: 120
                      maxWeight: 100.0
                  consistency: 85.5
                mealStats:
                  averageCalories: 2200.0
                  averageProtein: 150.5
                  averageCarbs: 250.0
                  averageFats: 75.0
                  weeklyAverages:
                    - week: "2024-W02"
                      calories: 2150.0
                      protein: 145.0
                      carbs: 240.0
                      fats: 70.0
                    - week: "2024-W03"
                      calories: 2250.0
                      protein: 155.0
                      carbs: 260.0
                      fats: 80.0
                  mealTypeBreakdown:
                    - mealType: "breakfast"
                      count: 15
                    - mealType: "lunch"
                      count: 15
                    - mealType: "dinner"
                      count: 15
                    - mealType: "snack"
                      count: 5
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                trainer_only:
                  summary: Only trainers can view client stats
                  value:
                    error: "Only trainers can view client stats"
                no_relationship:
                  summary: No active relationship
                  value:
                    error: "You don't have an active relationship with this client"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to verify relationship"

  /relationships/{id}:
    delete:
      tags:
        - Relationships
      summary: Terminate relationship
      description: Either the trainer or athlete can terminate the relationship. This action deactivates the relationship and removes the trainer assignment from the athlete's profile.
      operationId: terminateRelationship
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Relationship ID
          schema:
            type: string
          example: "rel-001"
      responses:
        '200':
          description: Relationship terminated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminateRelationshipResponse'
              example:
                message: "Relationship terminated successfully"
                relationship:
                  relationshipId: "rel-001"
                  trainerId: "trainer-123"
                  athleteId: "athlete-456"
                  status: "terminated"
                  createdAt: "2024-01-15T10:00:00Z"
                  updatedAt: "2024-01-20T15:30:00Z"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "You are not authorized to terminate this relationship"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Relationship not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to terminate relationship"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint

  schemas:
    GenerateInvitationResponse:
      type: object
      required:
        - message
        - invitation
      properties:
        message:
          type: string
          description: Success message
          example: "Invitation generated successfully"
        invitation:
          type: object
          required:
            - code
            - expiresAt
          properties:
            code:
              type: string
              description: 8-character invitation code
              example: "ABC12345"
            expiresAt:
              type: string
              format: date-time
              description: Expiration timestamp
              example: "2024-01-02T00:00:00Z"

    AcceptInvitationRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 8
          maxLength: 8
          description: 8-character invitation code
          example: "ABC12345"

    AcceptInvitationResponse:
      type: object
      required:
        - message
        - relationship
      properties:
        message:
          type: string
          description: Success message
          example: "Invitation accepted successfully"
        relationship:
          $ref: '#/components/schemas/Relationship'

    Relationship:
      type: object
      required:
        - relationshipId
        - trainerId
        - athleteId
        - status
        - type
      properties:
        relationshipId:
          type: string
          description: Unique relationship identifier
          example: "rel-001"
        trainerId:
          type: string
          description: Trainer user ID
          example: "trainer-123"
        athleteId:
          type: string
          description: Athlete user ID
          example: "athlete-456"
        status:
          $ref: '#/components/schemas/RelationshipStatus'
        type:
          type: string
          description: Always "relationship"
          example: "relationship"
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-15T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-01-15T10:00:00Z"

    RelationshipStatus:
      type: string
      enum: [pending, active, terminated]
      description: Relationship status
      example: "active"

    GetMyTrainerResponse:
      type: object
      properties:
        pendingInvitations:
          type: array
          items:
            $ref: '#/components/schemas/Invitation'
          description: List of pending invitations
        activeTrainer:
          type: object
          description: Active trainer information (if exists)
          properties:
            relationship:
              $ref: '#/components/schemas/Relationship'
            trainer:
              $ref: '#/components/schemas/User'

    Invitation:
      type: object
      required:
        - invitationId
        - code
        - trainerId
        - athleteId
        - status
        - expiresAt
        - createdAt
      properties:
        invitationId:
          type: string
          description: Unique invitation identifier
          example: "inv-001"
        code:
          type: string
          description: 8-character invitation code
          example: "ABC12345"
        trainerId:
          type: string
          description: Trainer user ID
          example: "trainer-123"
        athleteId:
          type: string
          description: Athlete user ID
          example: "athlete-456"
        status:
          type: string
          enum: [pending, accepted, expired]
          description: Invitation status
          example: "pending"
        expiresAt:
          type: string
          format: date-time
          description: Expiration timestamp
          example: "2024-01-02T00:00:00Z"
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-01T12:00:00Z"

    User:
      type: object
      required:
        - userId
        - email
        - role
        - createdAt
        - updatedAt
      properties:
        userId:
          type: string
          format: uuid
          description: Unique user identifier
          example: "trainer-123"
        email:
          type: string
          format: email
          description: User's email address
          example: "trainer@example.com"
        role:
          type: string
          enum: [trainer, athlete]
          description: User's role
          example: "trainer"
        profile:
          $ref: '#/components/schemas/UserProfile'
        createdAt:
          type: string
          format: date-time
          description: Account creation timestamp
          example: "2024-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-01-01T00:00:00Z"

    UserProfile:
      type: object
      description: User profile information
      properties:
        name:
          type: string
          description: User's full name
          example: "Jane Smith"
        age:
          type: integer
          minimum: 13
          maximum: 120
          description: User's age
          example: 25
        weight:
          type: integer
          minimum: 1
          description: User's weight in kg
          example: 75
        height:
          type: integer
          minimum: 1
          description: User's height in cm
          example: 180
        fitnessGoals:
          type: string
          description: User's fitness goals
          example: "Build muscle and improve endurance"
        trainerAssignment:
          type: string
          description: Athlete's trainer ID (if assigned)
          example: "trainer-123"
        certifications:
          type: string
          description: Trainer's certifications
          example: "NASM-CPT"
        specializations:
          type: string
          description: Trainer's areas of expertise
          example: "Strength training, weight loss"
        yearsOfExperience:
          type: integer
          minimum: 0
          description: Years of experience as a trainer
          example: 5
        location:
          type: string
          description: Trainer's location
          example: "New York, NY"
        hourlyRate:
          type: number
          minimum: 0
          description: Trainer's hourly rate
          example: 75
        languages:
          type: array
          items:
            type: string
          description: Languages spoken by trainer
          example: ["English", "Spanish"]
        clientList:
          type: array
          items:
            type: string
          description: List of client IDs
          example: ["client-1", "client-2"]

    GetMyClientsResponse:
      type: object
      required:
        - clients
        - count
      properties:
        clients:
          type: array
          items:
            $ref: '#/components/schemas/ClientWithAthlete'
          description: List of clients with their athlete profiles
        count:
          type: integer
          minimum: 0
          description: Total number of clients
          example: 1

    ClientWithAthlete:
      type: object
      required:
        - relationship
        - athlete
      properties:
        relationship:
          $ref: '#/components/schemas/Relationship'
        athlete:
          $ref: '#/components/schemas/User'

    GetClientDetailsResponse:
      type: object
      required:
        - relationship
        - athlete
        - stats
      properties:
        relationship:
          $ref: '#/components/schemas/Relationship'
        athlete:
          $ref: '#/components/schemas/User'
        stats:
          $ref: '#/components/schemas/ClientStats'

    ClientStats:
      type: object
      required:
        - totalWorkouts
        - totalMeals
        - workoutsThisWeek
        - mealsThisWeek
      properties:
        totalWorkouts:
          type: integer
          minimum: 0
          description: Total number of workouts logged
          example: 15
        totalMeals:
          type: integer
          minimum: 0
          description: Total number of meals logged
          example: 45
        workoutsThisWeek:
          type: integer
          minimum: 0
          description: Number of workouts this week
          example: 3
        mealsThisWeek:
          type: integer
          minimum: 0
          description: Number of meals this week
          example: 9

    GetClientStatsResponse:
      type: object
      required:
        - workoutStats
        - mealStats
      properties:
        workoutStats:
          $ref: '#/components/schemas/WorkoutStats'
        mealStats:
          $ref: '#/components/schemas/MealStats'

    WorkoutStats:
      type: object
      required:
        - totalVolume
        - consistency
      properties:
        totalVolume:
          type: number
          minimum: 0
          description: Total workout volume (weight × reps)
          example: 15000.5
        weeklyVolume:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyVolumePoint'
          description: Weekly volume breakdown
        exerciseBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseStat'
          description: Exercise-specific statistics
        consistency:
          type: number
          minimum: 0
          maximum: 100
          description: Workout consistency percentage
          example: 85.5

    WeeklyVolumePoint:
      type: object
      required:
        - week
        - volume
        - workouts
      properties:
        week:
          type: string
          description: Week identifier (YYYY-WXX format)
          example: "2024-W02"
        volume:
          type: number
          minimum: 0
          description: Total volume for the week
          example: 3500.0
        workouts:
          type: integer
          minimum: 0
          description: Number of workouts in the week
          example: 3

    ExerciseStat:
      type: object
      required:
        - name
        - totalSets
        - totalReps
        - maxWeight
      properties:
        name:
          type: string
          description: Exercise name
          example: "Bench Press"
        totalSets:
          type: integer
          minimum: 0
          description: Total sets performed
          example: 20
        totalReps:
          type: integer
          minimum: 0
          description: Total reps performed
          example: 160
        maxWeight:
          type: number
          minimum: 0
          description: Maximum weight used
          example: 80.0

    MealStats:
      type: object
      required:
        - averageCalories
        - averageProtein
        - averageCarbs
        - averageFats
      properties:
        averageCalories:
          type: number
          minimum: 0
          description: Average daily calories
          example: 2200.0
        averageProtein:
          type: number
          minimum: 0
          description: Average daily protein (g)
          example: 150.5
        averageCarbs:
          type: number
          minimum: 0
          description: Average daily carbohydrates (g)
          example: 250.0
        averageFats:
          type: number
          minimum: 0
          description: Average daily fats (g)
          example: 75.0
        weeklyAverages:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyMealAvg'
          description: Weekly nutrition averages
        mealTypeBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/MealTypeStat'
          description: Meal type breakdown

    WeeklyMealAvg:
      type: object
      required:
        - week
        - calories
        - protein
        - carbs
        - fats
      properties:
        week:
          type: string
          description: Week identifier (YYYY-WXX format)
          example: "2024-W02"
        calories:
          type: number
          minimum: 0
          description: Average daily calories for the week
          example: 2150.0
        protein:
          type: number
          minimum: 0
          description: Average daily protein (g) for the week
          example: 145.0
        carbs:
          type: number
          minimum: 0
          description: Average daily carbohydrates (g) for the week
          example: 240.0
        fats:
          type: number
          minimum: 0
          description: Average daily fats (g) for the week
          example: 70.0

    MealTypeStat:
      type: object
      required:
        - mealType
        - count
      properties:
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
          description: Type of meal
          example: "breakfast"
        count:
          type: integer
          minimum: 0
          description: Number of meals of this type
          example: 15

    TerminateRelationshipResponse:
      type: object
      required:
        - message
        - relationship
      properties:
        message:
          type: string
          description: Success message
          example: "Relationship terminated successfully"
        relationship:
          $ref: '#/components/schemas/Relationship'

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
          example: "An error occurred"

