openapi: 3.0.0
info:
  title: GymTrack API - Meal Tracking
  description: Meal tracking endpoints for athletes and trainers to log and monitor nutrition
  version: 1.0.0
  contact:
    name: GymTrack API Support
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api
    description: Development server

paths:
  /meals:
    get:
      tags:
        - Meals
      summary: Get athlete's meals
      description: Retrieve paginated meal history for the authenticated athlete with optional date range filtering
      operationId: getMeals
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Number of meals to return (default: 50)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          example: 50
        - name: offset
          in: query
          description: Number of meals to skip (default: 0)
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
        - name: startDate
          in: query
          description: Start date in RFC3339 format
          schema:
            type: string
            format: date-time
          example: "2024-01-01T00:00:00Z"
        - name: endDate
          in: query
          description: End date in RFC3339 format
          schema:
            type: string
            format: date-time
          example: "2024-01-31T23:59:59Z"
        - name: date
          in: query
          description: Specific date to filter (YYYY-MM-DD format)
          schema:
            type: string
            format: date
          example: "2024-01-15"
      responses:
        '200':
          description: Meals retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMealsResponse'
              example:
                meals:
                  - mealId: "meal-001"
                    athleteId: "athlete-123"
                    date: "2024-01-15T12:00:00Z"
                    mealType: "lunch"
                    items:
                      - food: "Grilled Chicken Breast"
                        quantity: "200g"
                        calories: 330
                        macros:
                          protein: 62
                          carbs: 0
                          fats: 7
                      - food: "Brown Rice"
                        quantity: "1 cup"
                        calories: 216
                        macros:
                          protein: 5
                          carbs: 45
                          fats: 2
                    type: "meal"
                    createdAt: "2024-01-15T12:05:00Z"
                    updatedAt: "2024-01-15T12:05:00Z"
                count: 1
        '400':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid date format. Use RFC3339 format."
        '403':
          description: Only athletes can list their meals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Only athletes can list their meals"
        '500':
          description: Failed to retrieve meals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to retrieve meals"

    post:
      tags:
        - Meals
      summary: Create a meal entry
      description: Create a new meal entry for the authenticated athlete
      operationId: createMeal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMealRequest'
            example:
              date: "2024-01-15T12:00:00Z"
              mealType: "lunch"
              items:
                - food: "Grilled Chicken Breast"
                  quantity: "200g"
                  calories: 330
                  macros:
                    protein: 62
                    carbs: 0
                    fats: 7
                - food: "Brown Rice"
                  quantity: "1 cup"
                  calories: 216
                  macros:
                    protein: 5
                    carbs: 45
                    fats: 2
      responses:
        '201':
          description: Meal created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meal'
              example:
                mealId: "meal-001"
                athleteId: "athlete-123"
                date: "2024-01-15T12:00:00Z"
                mealType: "lunch"
                items:
                  - food: "Grilled Chicken Breast"
                    quantity: "200g"
                    calories: 330
                    macros:
                      protein: 62
                      carbs: 0
                      fats: 7
                  - food: "Brown Rice"
                    quantity: "1 cup"
                    calories: 216
                    macros:
                      protein: 5
                      carbs: 45
                      fats: 2
                type: "meal"
                createdAt: "2024-01-15T12:05:00Z"
                updatedAt: "2024-01-15T12:05:00Z"
        '400':
          description: Invalid request body or validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid request body"
        '401':
          description: User not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "User not authenticated"
        '403':
          description: Only athletes can create meals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Only athletes can create meals"
        '500':
          description: Failed to create meal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to create meal"

  /meals/{id}:
    get:
      tags:
        - Meals
      summary: Get a specific meal
      description: Retrieve a meal by its ID (athletes can only access their own meals)
      operationId: getMeal
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Meal ID
          schema:
            type: string
          example: "meal-001"
      responses:
        '200':
          description: Meal retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meal'
              example:
                mealId: "meal-001"
                athleteId: "athlete-123"
                date: "2024-01-15T12:00:00Z"
                mealType: "lunch"
                items:
                  - food: "Grilled Chicken Breast"
                    quantity: "200g"
                    calories: 330
                    macros:
                      protein: 62
                      carbs: 0
                      fats: 7
                  - food: "Brown Rice"
                    quantity: "1 cup"
                    calories: 216
                    macros:
                      protein: 5
                      carbs: 45
                      fats: 2
                type: "meal"
                createdAt: "2024-01-15T12:05:00Z"
                updatedAt: "2024-01-15T12:05:00Z"
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Access denied"
        '404':
          description: Meal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Meal not found"
        '500':
          description: Failed to retrieve meal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to retrieve meal"

    put:
      tags:
        - Meals
      summary: Update a meal
      description: Update an existing meal (only within 24 hours of creation, athletes can only update their own meals)
      operationId: updateMeal
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Meal ID
          schema:
            type: string
          example: "meal-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMealRequest'
            example:
              date: "2024-01-15T12:00:00Z"
              mealType: "lunch"
              items:
                - food: "Grilled Chicken Breast"
                  quantity: "250g"
                  calories: 412
                  macros:
                    protein: 77
                    carbs: 0
                    fats: 9
                - food: "Brown Rice"
                  quantity: "1.5 cups"
                  calories: 324
                  macros:
                    protein: 7
                    carbs: 67
                    fats: 3
      responses:
        '200':
          description: Meal updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meal'
              example:
                mealId: "meal-001"
                athleteId: "athlete-123"
                date: "2024-01-15T12:00:00Z"
                mealType: "lunch"
                items:
                  - food: "Grilled Chicken Breast"
                    quantity: "250g"
                    calories: 412
                    macros:
                      protein: 77
                      carbs: 0
                      fats: 9
                  - food: "Brown Rice"
                    quantity: "1.5 cups"
                    calories: 324
                    macros:
                      protein: 7
                      carbs: 67
                      fats: 3
                type: "meal"
                createdAt: "2024-01-15T12:05:00Z"
                updatedAt: "2024-01-15T13:00:00Z"
        '400':
          description: Invalid request body or validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid request body"
        '403':
          description: Access denied or cannot edit after 24 hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                access_denied:
                  summary: Access denied
                  value:
                    error: "Access denied"
                edit_window_expired:
                  summary: Edit window expired
                  value:
                    error: "Cannot edit meal after 24 hours"
        '404':
          description: Meal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Meal not found"
        '500':
          description: Failed to update meal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to update meal"

    delete:
      tags:
        - Meals
      summary: Delete a meal
      description: Delete an existing meal (only within 24 hours of creation, athletes can only delete their own meals)
      operationId: deleteMeal
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Meal ID
          schema:
            type: string
          example: "meal-001"
      responses:
        '200':
          description: Meal deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              example:
                message: "Meal deleted successfully"
        '403':
          description: Access denied or cannot delete after 24 hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                access_denied:
                  summary: Access denied
                  value:
                    error: "Access denied"
                delete_window_expired:
                  summary: Delete window expired
                  value:
                    error: "Cannot delete meal after 24 hours"
        '404':
          description: Meal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Meal not found"
        '500':
          description: Failed to delete meal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to delete meal"

  /clients/{id}/meals:
    get:
      tags:
        - Meals
      summary: Get client's meals (trainer view)
      description: Retrieve paginated meal history for a specific client (trainers only, requires active relationship)
      operationId: getClientMeals
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Client (athlete) ID
          schema:
            type: string
          example: "athlete-123"
        - name: limit
          in: query
          description: Number of meals to return (default: 50)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          example: 50
        - name: offset
          in: query
          description: Number of meals to skip (default: 0)
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
        - name: startDate
          in: query
          description: Start date in RFC3339 format
          schema:
            type: string
            format: date-time
          example: "2024-01-01T00:00:00Z"
        - name: endDate
          in: query
          description: End date in RFC3339 format
          schema:
            type: string
            format: date-time
          example: "2024-01-31T23:59:59Z"
        - name: mealType
          in: query
          description: Filter by meal type (breakfast, lunch, dinner, snack)
          schema:
            type: string
            enum: [breakfast, lunch, dinner, snack]
          example: "lunch"
      responses:
        '200':
          description: Client meals retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMealsResponse'
              example:
                meals:
                  - mealId: "meal-001"
                    athleteId: "athlete-123"
                    date: "2024-01-15T12:00:00Z"
                    mealType: "lunch"
                    items:
                      - food: "Grilled Chicken Breast"
                        quantity: "200g"
                        calories: 330
                        macros:
                          protein: 62
                          carbs: 0
                          fats: 7
                      - food: "Brown Rice"
                        quantity: "1 cup"
                        calories: 216
                        macros:
                          protein: 5
                          carbs: 45
                          fats: 2
                    type: "meal"
                    createdAt: "2024-01-15T12:05:00Z"
                    updatedAt: "2024-01-15T12:05:00Z"
                count: 1
        '400':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid date format. Use RFC3339 format."
        '403':
          description: Only trainers can view client meals or no active relationship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                trainer_only:
                  summary: Only trainers can view client meals
                  value:
                    error: "Only trainers can view client meals"
                no_relationship:
                  summary: No active relationship
                  value:
                    error: "No active relationship with this client"
        '500':
          description: Failed to retrieve meals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to retrieve meals"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint

  schemas:
    Meal:
      type: object
      required:
        - mealId
        - athleteId
        - date
        - mealType
        - items
        - type
      properties:
        mealId:
          type: string
          description: Unique meal identifier
          example: "meal-001"
        athleteId:
          type: string
          description: ID of the athlete who logged the meal
          example: "athlete-123"
        date:
          type: string
          format: date-time
          description: Date and time of the meal
          example: "2024-01-15T12:00:00Z"
        mealType:
          $ref: '#/components/schemas/MealType'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FoodItem'
          description: List of food items in the meal
        type:
          type: string
          description: Always "meal"
          example: "meal"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the meal was created
          example: "2024-01-15T12:05:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the meal was last updated
          example: "2024-01-15T12:05:00Z"

    MealType:
      type: string
      enum: [breakfast, lunch, dinner, snack]
      description: Type of meal
      example: "lunch"

    FoodItem:
      type: object
      required:
        - food
        - quantity
      properties:
        food:
          type: string
          description: Name of the food item
          example: "Grilled Chicken Breast"
        quantity:
          type: string
          description: Quantity of the food item
          example: "200g"
        calories:
          type: number
          minimum: 0
          description: Calorie count for the food item
          example: 330
        macros:
          $ref: '#/components/schemas/Macros'

    Macros:
      type: object
      properties:
        protein:
          type: number
          minimum: 0
          description: Protein content in grams
          example: 62
        carbs:
          type: number
          minimum: 0
          description: Carbohydrate content in grams
          example: 45
        fats:
          type: number
          minimum: 0
          description: Fat content in grams
          example: 7

    CreateMealRequest:
      type: object
      required:
        - date
        - mealType
        - items
      properties:
        date:
          type: string
          format: date-time
          description: Date and time of the meal in RFC3339 format
          example: "2024-01-15T12:00:00Z"
        mealType:
          $ref: '#/components/schemas/MealType'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FoodItem'
          description: List of food items in the meal

    UpdateMealRequest:
      type: object
      required:
        - date
        - mealType
        - items
      properties:
        date:
          type: string
          format: date-time
          description: Date and time of the meal in RFC3339 format
          example: "2024-01-15T12:00:00Z"
        mealType:
          $ref: '#/components/schemas/MealType'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FoodItem'
          description: Updated list of food items in the meal

    GetMealsResponse:
      type: object
      required:
        - meals
        - count
      properties:
        meals:
          type: array
          items:
            $ref: '#/components/schemas/Meal'
          description: Array of meals
        count:
          type: integer
          minimum: 0
          description: Total number of meals matching the query
          example: 1

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: "Meal deleted successfully"

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
          example: "An error occurred"

tags:
  - name: Meals
    description: Meal tracking and nutrition management operations
